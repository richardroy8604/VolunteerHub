{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — VolunteerHub</title>

    <!-- Google Fonts (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">

    <!-- Custom stylesheet (includes login styles) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-container">

    <div class="login-card">
        <!-- Logo from static files -->
        <img src="{% static 'images/rcsslogo.png' %}" alt="RCSS Logo" class="login-logo">
        
        <h1 class="login-title">VolunteerHub</h1>
        <p class="login-subtitle">Rajagiri College of Social Sciences</p>

        {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} py-2 px-3 mb-2" role="alert">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'accounts:login' %}" novalidate>
            {% csrf_token %}

            <div class="form-group text-start">
                <label class="form-label" for="username-field">College Email / Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="fa-regular fa-envelope"></i>
                    </span>
                    <input type="text" id="username-field" name="username" class="form-control border-start-0" placeholder="e.g. arjun@rajagiri.edu" required>
                </div>
            </div>

            <div class="form-group text-start">
                <label class="form-label" for="password-field">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password-field" name="password" class="form-control border-start-0 border-end-0 password-input" placeholder="Enter your password" required>
                    <button type="button" class="btn btn-outline-secondary bg-white border-start-0 text-muted toggle-password-btn" style="border: 1px solid var(--clr-border); border-left: none; margin: 0; padding: 0 12px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;" aria-label="Toggle Password Visibility">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Login Actions -->
            <div class="d-flex justify-content-between align-items-center mb-4" style="font-size: 0.85rem;">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember-me" name="remember">
                    <label class="form-check-label text-muted" for="remember-me" style="cursor: pointer; user-select: none;">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-success font-weight-bold" style="font-weight: 500;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2" style="font-size: 1rem;">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Log In
            </button>
        </form>

        <!-- Google Login Placeholder for deployment info -->
        <div class="mt-4 pt-3 border-top text-center text-muted" style="font-size: 0.75rem;">
            <p class="mb-2">For deployment: Google authentication restricted to @rajagiri.edu will be active.</p>
            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2" style="font-size: 0.85rem; border-color: #ddd;" disabled>
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" width="16" height="16">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Custom UI Interaction Scripts (includes password toggles) -->
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
