{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile — VolunteerHub</title>

    <!-- Google Fonts (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">

    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .profile-upload-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }
        .profile-upload-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--clr-primary);
            background-color: var(--clr-primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--clr-primary);
        }
        .profile-upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: var(--clr-primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: background-color var(--transition-speed);
        }
        .profile-upload-btn:hover {
            background-color: var(--clr-primary-hover);
        }
    </style>
</head>
<body class="login-container">

    <div class="login-card" style="max-width: 480px;">
        <img src="{% static 'images/rcsslogo.png' %}" alt="RCSS Logo" class="login-logo" style="width: 55px; height: 55px; margin-bottom: 12px;">
        
        <h1 class="login-title" style="font-size: 1.35rem;">Welcome to VolunteerHub!</h1>
        <p class="login-subtitle" style="margin-bottom: 24px;">Please complete your profile to continue</p>

        <form method="post" action="" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Profile Picture Upload Widget -->
            <div class="profile-upload-wrapper">
                <div class="profile-upload-preview" id="pic-preview">
                    <i class="fa-solid fa-user"></i>
                </div>
                <label for="id_profile_picture" class="profile-upload-btn" title="Upload Photo">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="id_profile_picture" name="profile_picture" accept="image/*" class="d-none">
            </div>

            <!-- Mandatory Phone Input & Verification -->
            <div class="form-group text-start">
                <label class="form-label" for="phone-field">Mandatory Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="tel" id="phone-field" name="phone" class="form-control border-start-0 border-end-0" placeholder="e.g. +91 9876543210" required>
                    <button type="button" id="verify-btn" class="btn btn-outline-success" style="margin: 0; padding: 0 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 0.85rem; border-color: var(--clr-border); border-left: none;">
                        Verify
                    </button>
                </div>
                <div class="form-text text-muted" id="verification-status" style="font-size: 0.75rem; margin-top: 6px;">
                    <i class="fa-solid fa-circle-info text-warning me-1"></i> Phone verification is mandatory to unlock access.
                </div>
            </div>

            <!-- Department and Class information (readonly verification) -->
            <div class="row text-start mt-3">
                <div class="col-md-6 form-group">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" value="Computer Science" readonly style="background-color: var(--clr-bg-main); font-size: 0.85rem;">
                </div>
                <div class="col-md-6 form-group">
                    <label class="form-label">Semester / Class</label>
                    <input type="text" class="form-control" value="6th Sem / CS-B" readonly style="background-color: var(--clr-bg-main); font-size: 0.85rem;">
                </div>
            </div>

            <!-- Warning notice -->
            <div class="alert alert-warning border-0 p-3 mt-2 text-start d-flex gap-2 align-items-start" style="font-size: 0.8rem; border-radius: var(--radius-md);">
                <i class="fa-solid fa-triangle-exclamation mt-1"></i>
                <span>Confirm your department info is correct. If it is wrong, contact the college administrator immediately.</span>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary w-100 py-2 mt-3" disabled>
                <i class="fa-solid fa-circle-check me-2"></i> Complete Profile Setup
            </button>
        </form>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- UI interactivity scripts for verification mock -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const phoneField = document.getElementById('phone-field');
            const verifyBtn = document.getElementById('verify-btn');
            const statusDiv = document.getElementById('verification-status');
            const submitBtn = document.getElementById('submit-btn');
            const picInput = document.getElementById('id_profile_picture');
            const picPreview = document.getElementById('pic-preview');

            // Handle picture preview
            if (picInput && picPreview) {
                picInput.addEventListener('change', function() {
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            picPreview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                        }
                        reader.readAsDataURL(file);
                    }
                });
            }

            // Mock verification flow
            if (verifyBtn && phoneField && statusDiv && submitBtn) {
                verifyBtn.addEventListener('click', function() {
                    const phoneVal = phoneField.value.trim();
                    if (phoneVal.length < 10) {
                        statusDiv.innerHTML = `<i class="fa-solid fa-circle-xmark text-danger me-1"></i> Enter a valid phone number.`;
                        return;
                    }

                    verifyBtn.disabled = true;
                    verifyBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
                    statusDiv.innerHTML = `<i class="fa-solid fa-circle-info text-info me-1"></i> Sending verification code...`;

                    setTimeout(function() {
                        // Mock verified success
                        verifyBtn.innerHTML = `Verified ✓`;
                        verifyBtn.classList.remove('btn-outline-success');
                        verifyBtn.classList.add('btn-success');
                        phoneField.readOnly = true;
                        
                        statusDiv.innerHTML = `<i class="fa-solid fa-circle-check text-success me-1"></i> Phone number successfully verified!`;
                        submitBtn.disabled = false;
                    }, 1500);
                });
            }
        });
    </script>
</body>
</html>
